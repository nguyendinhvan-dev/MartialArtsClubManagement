<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet">

    <link rel="stylesheet"
    href="../css/style.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="text-center mb-4">

            <div class="logo-circle mx-auto">

                <i class="fa-solid fa-fire"></i>

            </div>

            <h2 class="mt-3">
                KARATE UTE
            </h2>

        </div>

        <h1 class="text-center mb-4">

            Đăng nhập

        </h1>

        <form id="loginForm">

            <div class="mb-3">

                <label>
                    Tên đăng nhập
                </label>

                <input
                type="text"
                id="username"
                class="form-control"
                placeholder="Nhập tên đăng nhập">

            </div>

            <div class="mb-4">

                <label>
                    Mật khẩu
                </label>

                <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Nhập mật khẩu">

            </div>

            <button
            type="submit"
            class="btn btn-danger w-100">

                Đăng nhập

            </button>

        </form>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>

</body>
</html>
