<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ĐĂNG NHẬP | KARATE-DO UTE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #e63946;
            --dark: #0f0f0f;
            --gray-dark: #1a1a1a;
            --text-light: #ffffff;
        }

        body {
            background-color: var(--dark);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;

            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            margin: 0;

            overflow-x: hidden;
            overflow-y: auto;

            padding: 20px 0;

            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1555597673-b21d5c935865?q=80&w=2072');

            background-size: cover;
            background-position: center;
        }

        h1, h2, .btn-login {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        /* =========================
           LOGIN CONTAINER
        ========================== */

        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 15px;
        }

        /* =========================
           LOGO
        ========================== */

        .login-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-circle {
            width: 55px;
            height: 55px;

            background: var(--primary);

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            margin: 0 auto 12px;

            border: 2px solid white;

            box-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
        }

        /* =========================
           LOGIN CARD
        ========================== */

        .login-card {
            background: var(--gray-dark);

            border: 1px solid #333;

            padding: 28px;

            border-top: 5px solid var(--primary);

            box-shadow: 0 15px 35px rgba(0,0,0,0.5);

            position: relative;
        }

        .login-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .text-outline {
            -webkit-text-stroke: 1px white;
            color: transparent;

            font-size: 1.5rem;

            display: block;
            margin-bottom: 25px;
        }

        /* =========================
           FORM
        ========================== */

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #888;
            text-transform: uppercase;
        }

        .form-control {
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;

            padding: 9px 12px;

            border-radius: 0;

            transition: 0.3s;

            font-size: 14px;
        }

        .form-control:focus {
            background: #0a0a0a;
            border-color: var(--primary);
            box-shadow: none;
            color: white;
        }

        .input-group-text {
            background: #000;
            border: 1px solid #444;
            color: #888;
            padding: 0 14px;
        }

        /* =========================
           BUTTON
        ========================== */

        .btn-login {
            background: var(--primary);
            color: white;

            width: 100%;

            padding: 10px;

            font-size: 1rem;
            font-weight: 700;

            border: none;
            border-radius: 0;

            margin-top: 15px;

            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background: white;
            color: var(--primary);
            transform: translateY(-3px);
        }

        /* =========================
           BACK HOME
        ========================== */

        .back-home {
            display: inline-block;
            margin-top: 20px;

            color: #666;

            text-decoration: none;

            font-size: 0.85rem;

            transition: 0.3s;
        }

        .back-home:hover {
            color: var(--primary);
        }

        /* =========================
           CORNER EFFECT
        ========================== */

        .corner-decoration {
            position: absolute;

            bottom: 0;
            right: 0;

            width: 45px;
            height: 45px;

            background: linear-gradient(
                135deg,
                transparent 50%,
                rgba(230, 57, 70, 0.1) 50%
            );
        }

        /* =========================
           RESPONSIVE
        ========================== */

        @media (max-height: 800px) {

            .login-logo {
                margin-bottom: 18px;
            }

            .login-card {
                padding: 22px;
            }

            .login-title {
                font-size: 1.9rem;
            }

            .text-outline {
                font-size: 1.2rem;
                margin-bottom: 18px;
            }

            .mb-4 {
                margin-bottom: 0.9rem !important;
            }

            .btn-login {
                margin-top: 10px;
                padding: 9px;
            }

        }

    </style>
</head>

<body>

    <div class="login-container">

        <div class="login-logo">

            <div class="logo-circle">
                <i class="fas fa-hand-fist fa-lg text-white"></i>
            </div>

            <h5 class="fw-bold mb-0">
                KARATE UTE
            </h5>

            <small class="text-secondary" style="letter-spacing: 2px;">
                MANAGEMENT SYSTEM
            </small>

        </div>

        <div class="login-card">

            <h1 class="login-title">
                ĐĂNG NHẬP
            </h1>

            <span class="text-outline">
                DASHBOARD
            </span>

            <form>

                <div class="mb-4">

                    <label class="form-label">
                        Tên đăng nhập / Mã SV
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="fas fa-user"></i>
                        </span>

                        <input 
                            type="text"
                            class="form-control"
                            placeholder="Nhập tài khoản..."
                        >

                    </div>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Mật khẩu
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="fas fa-lock"></i>
                        </span>

                        <input 
                            type="password"
                            class="form-control"
                            placeholder="••••••••"
                        >

                    </div>

                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <div class="form-check">

                        <input 
                            type="checkbox"
                            class="form-check-input"
                            id="remember"
                        >

                        <label class="form-check-label small text-secondary" for="remember">
                            Ghi nhớ tôi
                        </label>

                    </div>

                    <a href="#" class="small text-decoration-none text-primary">
                        Quên mật khẩu?
                    </a>

                </div>

                <button type="button" class="btn-login">
                   <a href="dashboard.html" style="color: #ffffff;">VÀO HỆ THỐNG</a> 
                    <i class="fas fa-sign-in-alt ms-2"></i>
                </button>

            </form>

            <div class="corner-decoration"></div>

        </div>

        <div class="text-center">

            <a href="landingpage.html" class="back-home">
                <i class="fas fa-arrow-left me-2"></i>
                Quay lại trang chủ
            </a>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
