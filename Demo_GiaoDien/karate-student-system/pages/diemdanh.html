<div class="main">

    <div class="topbar">

        <h1 class="topbar-title">
            Điểm danh

    </div>

    <div class="attendance-stats">

        <div class="attendance-stat-card">

            <i class="fa-solid fa-check"></i>

            <h2 id="present-count">0</h2>
            <p>Buổi có mặt</p>

        </div>

        <div class="attendance-stat-card warning">

            <i class="fa-solid fa-clock"></i>

            <h2 id="late-count">0</h2>
            <p>Đi muộn</p>

        </div>

        <div class="attendance-stat-card danger">

            <i class="fa-solid fa-xmark"></i>

            <h2 id="absent-count">0</h2>
            <p>Vắng mặt</p>
        </div>

    </div>

    <div class="attendance-progress-card">

        <div class="progress-header">

            <h3>Tỷ lệ chuyên cần</h3>

            <span id="attendance-percent">
0%
</span>

        </div>

        <div class="progress">

            <div
         class="progress-bar"
         id="attendance-bar">
</div>

        </div>

    </div>

    <div class="attendance-list">

    <div id="attendanceContainer">

    </div>
