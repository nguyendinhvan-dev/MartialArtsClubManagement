<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - Huấn luyện viên | CLB Võ Thuật</title>
    
    <!-- Bootstrap + FontAwesome + Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/huanluyenvien.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo-circle"><i class="fas fa-hand-fist"></i></div>
        <h4>CLB VÕ THUẬT</h4>
        <small style="color: #AAA;">HỆ THỐNG QUẢN LÝ</small>
    </div>
    <div class="sidebar-nav">
        <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="lich-day.html" class="nav-link"><i class="fas fa-calendar-alt"></i> Lịch dạy</a>
        <a href="hoc-vien.html" class="nav-link"><i class="fas fa-user-graduate"></i> Học viên</a>
        <a href="diem-danh.html" class="nav-link"><i class="fas fa-calendar-check"></i> Điểm danh</a>
        <a href="thi.html" class="nav-link"><i class="fas fa-medal"></i> Kỳ thi</a>
        <a href="thong-bao.html" class="nav-link"><i class="fas fa-bell"></i> Thông báo</a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user-cog"></i> Hồ sơ</a>
        <a href="doi-mat-khau.html" class="nav-link active"><i class="fas fa-key"></i> Đổi mật khẩu</a>
    </div>
</div>

<div class="topbar">
    <div class="topbar-title">HUẤN LUYỆN VIÊN / <span>ĐỔI MẬT KHẨU</span></div>
    <div>
        <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
    </div>
</div>

<div class="main-content">
    <h1 class="page-title">ĐỔI MẬT KHẨU</h1>
    
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div class="card-body">
            <form id="changePasswordForm">
                <div class="mb-3">
                    <label class="form-label">Mật khẩu cũ <span style="color: var(--primary);">*</span></label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="oldPassword" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('oldPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Mật khẩu mới <span style="color: var(--primary);">*</span></label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="newPassword" required minlength="6">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('newPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small class="text-secondary">Mật khẩu phải có ít nhất 6 ký tự</small>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Xác nhận mật khẩu mới <span style="color: var(--primary);">*</span></label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="confirmPassword" required minlength="6">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="alert alert-info small">
                    <i class="fas fa-shield-alt me-2"></i>
                    Lưu ý: Sau khi đổi mật khẩu, bạn sẽ cần đăng nhập lại.
                </div>
                
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-key me-2"></i> Đổi mật khẩu
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<!-- Scripts -->
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script>
// Initialize authentication
initAuth('HuanLuyenVien');

// Toggle password visibility
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const button = field.nextElementSibling;
    const icon = button.querySelector('i');
    
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

// Handle form submission
document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const oldPassword = document.getElementById('oldPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    // Validate passwords
    if (newPassword !== confirmPassword) {
        showToast('Mật khẩu mới và xác nhận mật khẩu không khớp', 'error');
        return;
    }
    
    if (newPassword === oldPassword) {
        showToast('Mật khẩu mới phải khác mật khẩu cũ', 'warning');
        return;
    }
    
    if (newPassword.length < 6) {
        showToast('Mật khẩu phải có ít nhất 6 ký tự', 'warning');
        return;
    }
    
    try {
        const result = await changePassword({
            matKhauCu: oldPassword,
            matKhauMoi: newPassword
        });
        
        if (result.success) {
            showToast('Đổi mật khẩu thành công! Vui lòng đăng nhập lại.', 'success');
            
            // Clear form
            document.getElementById('changePasswordForm').reset();
            
            // Logout after 2 seconds
            setTimeout(() => {
                logout();
            }, 2000);
        } else {
            showToast('Đổi mật khẩu thất bại: ' + result.message, 'error');
        }
    } catch (error) {
        console.error('Error changing password:', error);
        showToast('Lỗi khi đổi mật khẩu', 'error');
    }
});
</script>
</body>
</html>
