<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo - Huấn luyện viên | CLB Võ Thuật</title>
    
    <!-- Bootstrap + FontAwesome + Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/huanluyenvien.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo-circle"><i class="fas fa-hand-fist"></i></div>
        <h4>CLB VÕ THUẬT</h4>
        <small style="color: #AAA;">HỆ THỐNG QUẢN LÝ</small>
    </div>
    <div class="sidebar-nav">
        <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="lich-day.html" class="nav-link"><i class="fas fa-calendar-alt"></i> Lịch dạy</a>
        <a href="hoc-vien.html" class="nav-link"><i class="fas fa-user-graduate"></i> Học viên</a>
        <a href="diem-danh.html" class="nav-link"><i class="fas fa-calendar-check"></i> Điểm danh</a>
        <a href="thi.html" class="nav-link"><i class="fas fa-medal"></i> Kỳ thi</a>
        <a href="thong-bao.html" class="nav-link active"><i class="fas fa-bell"></i> Thông báo</a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user-cog"></i> Hồ sơ</a>
        <a href="doi-mat-khau.html" class="nav-link"><i class="fas fa-key"></i> Đổi mật khẩu</a>
    </div>
</div>

<div class="topbar">
    <div class="topbar-title">HUẤN LUYỆN VIÊN / <span>THÔNG BÁO</span></div>
    <div>
        <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
    </div>
</div>

<div class="main-content">
    <h1 class="page-title">THÔNG BÁO</h1>
    
    <!-- Filter -->
    <div class="card">
        <div class="filter-bar">
            <select class="form-select" id="notificationFilter" style="width: 200px;" onchange="filterNotifications()">
                <option value="all">Tất cả</option>
                <option value="unread">Chưa đọc</option>
                <option value="read">Đã đọc</option>
            </select>
            <button class="btn btn-primary" onclick="loadNotifications()">
                <i class="fas fa-sync"></i> Tải lại
            </button>
            <button class="btn btn-outline-info" onclick="markAllAsRead()">
                <i class="fas fa-check-double"></i> Đánh dấu đã đọc tất cả
            </button>
        </div>
    </div>
    
    <!-- Notifications List -->
    <div id="notificationsContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Đang tải thông báo...</p>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<!-- Scripts -->
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script>
// Initialize authentication
initAuth('HuanLuyenVien');

let allNotifications = [];

// Load notifications on page load
document.addEventListener('DOMContentLoaded', async function() {
    await loadNotifications();
});

async function loadNotifications() {
    try {
        showLoading('notificationsContainer');
        
        const data = await getNotifications();
        
        if (data.success) {
            allNotifications = data.data;
            filterNotifications();
        } else {
            document.getElementById('notificationsContainer').innerHTML = 
                '<div class="alert alert-warning">Không thể tải thông báo</div>';
        }
    } catch (error) {
        console.error('Error loading notifications:', error);
        document.getElementById('notificationsContainer').innerHTML = 
            '<div class="alert alert-danger">Lỗi khi tải thông báo</div>';
        showToast('Không thể tải thông báo', 'error');
    }
}

function filterNotifications() {
    const filter = document.getElementById('notificationFilter').value;
    
    let filtered = allNotifications;
    
    if (filter === 'unread') {
        filtered = allNotifications.filter(n => !n.daDoc);
    } else if (filter === 'read') {
        filtered = allNotifications.filter(n => n.daDoc);
    }
    
    renderNotifications(filtered);
}

function renderNotifications(notifications) {
    if (!notifications || notifications.length === 0) {
        document.getElementById('notificationsContainer').innerHTML = 
            '<div class="alert alert-info">Không có thông báo nào</div>';
        return;
    }
    
    let html = '';
    
    notifications.forEach(notification => {
        const unreadClass = !notification.daDoc ? 'border-left: 4px solid var(--primary);' : '';
        const bgClass = !notification.daDoc ? 'background: rgba(192,57,43,0.05);' : '';
        
        const iconClass = notification.loaiThongBao === 'info' ? 'fa-info-circle text-info' :
                        notification.loaiThongBao === 'warning' ? 'fa-exclamation-triangle text-warning' :
                        notification.loaiThongBao === 'success' ? 'fa-check-circle text-success' :
                        notification.loaiThongBao === 'error' ? 'fa-times-circle text-danger' :
                        'fa-bell text-primary';
        
        html += `
            <div class="card mb-3" style="${unreadClass} ${bgClass}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <h6 class="mb-2">
                                <i class="fas ${iconClass} me-2"></i>
                                ${notification.tieuDe || 'Thông báo'}
                            </h6>
                            <p class="mb-2">${notification.noiDung || ''}</p>
                            <small class="text-secondary">
                                <i class="fas fa-clock me-1"></i>
                                ${notification.thoiGian ? formatDateTime(notification.thoiGian) : 'Không xác định'}
                            </small>
                        </div>
                        <div class="ms-3">
                            ${!notification.daDoc ? 
                                `<button class="btn btn-sm btn-outline-primary" onclick="markAsRead('${notification.maThongBao}')">
                                    <i class="fas fa-check"></i> Đánh dấu đã đọc
                                </button>` : 
                                `<span class="text-success small"><i class="fas fa-check"></i> Đã đọc</span>`
                            }
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
    
    document.getElementById('notificationsContainer').innerHTML = html;
}

async function markAsRead(notificationId) {
    try {
        // Call API to mark as read
        // For now, just update local state
        const notification = allNotifications.find(n => n.maThongBao === notificationId);
        if (notification) {
            notification.daDoc = true;
            filterNotifications();
            showToast('Đã đánh dấu đã đọc', 'success');
        }
    } catch (error) {
        console.error('Error marking notification as read:', error);
        showToast('Lỗi khi đánh dấu đã đọc', 'error');
    }
}

async function markAllAsRead() {
    try {
        // Call API to mark all as read
        // For now, just update local state
        allNotifications.forEach(n => n.daDoc = true);
        filterNotifications();
        showToast('Đã đánh dấu tất cả đã đọc', 'success');
    } catch (error) {
        console.error('Error marking all as read:', error);
        showToast('Lỗi khi đánh dấu tất cả đã đọc', 'error');
    }
}
</script>
</body>
</html>
