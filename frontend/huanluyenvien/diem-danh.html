<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm danh - Huấn luyện viên | CLB Võ Thuật</title>
    
    <!-- Bootstrap + FontAwesome + Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/huanluyenvien.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo-circle"><i class="fas fa-hand-fist"></i></div>
        <h4>CLB VÕ THUẬT</h4>
        <small style="color: #AAA;">HỆ THỐNG QUẢN LÝ</small>
    </div>
    <div class="sidebar-nav">
        <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="lich-day.html" class="nav-link"><i class="fas fa-calendar-alt"></i> Lịch dạy</a>
        <a href="hoc-vien.html" class="nav-link"><i class="fas fa-user-graduate"></i> Học viên</a>
        <a href="diem-danh.html" class="nav-link active"><i class="fas fa-calendar-check"></i> Điểm danh</a>
        <a href="thi.html" class="nav-link"><i class="fas fa-medal"></i> Kỳ thi</a>
        <a href="thong-bao.html" class="nav-link"><i class="fas fa-bell"></i> Thông báo</a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user-cog"></i> Hồ sơ</a>
        <a href="doi-mat-khau.html" class="nav-link"><i class="fas fa-key"></i> Đổi mật khẩu</a>
    </div>
</div>

<div class="topbar">
    <div class="topbar-title">HUẤN LUYỆN VIÊN / <span>ĐIỂM DANH</span></div>
    <div>
        <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
    </div>
</div>

<div class="main-content">
    <h1 class="page-title">ĐIỂM DANH HỌC VIÊN</h1>
    
    <div class="card">
        <div class="filter-bar">
            <select class="form-select" id="attClassSelect" style="width: 200px;" onchange="loadAttendanceSheet()">
                <option value="">Chọn lớp</option>
            </select>
            <input type="date" class="form-control" id="attDate" style="width: 150px;" onchange="loadAttendanceSheet()">
            <button class="btn btn-primary" onclick="saveAttendance()">
                <i class="fas fa-save"></i> Lưu điểm danh
            </button>
        </div>
        
        <div id="attendanceSheet">
            <div class="text-center py-5">
                <p class="text-secondary">Vui lòng chọn lớp và ngày để điểm danh</p>
            </div>
        </div>
        
        <hr>
        
        <h6>Lịch sử điểm danh gần đây</h6>
        <div id="attHistory">
            <p class="text-secondary small">Chưa có dữ liệu</p>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<!-- Scripts -->
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script>
// Initialize authentication
initAuth('HuanLuyenVien');

let currentStudents = [];

// Load on page load
document.addEventListener('DOMContentLoaded', async function() {
    // Set default date to today
    document.getElementById('attDate').value = getCurrentDate();
    
    await loadClassFilter();
    
    // Check URL parameters for pre-selected class and date
    const urlParams = new URLSearchParams(window.location.search);
    const classId = urlParams.get('classId');
    const date = urlParams.get('date');
    
    if (classId) {
        document.getElementById('attClassSelect').value = classId;
    }
    if (date) {
        document.getElementById('attDate').value = date;
    }
    
    if (classId) {
        await loadAttendanceSheet();
    }
});

async function loadClassFilter() {
    try {
        const data = await getHLVSchedule();
        if (data.success && data.data) {
            const classes = [...new Set(data.data.map(item => ({
                maLop: item.maLop,
                tenLop: item.tenLop
            })))];
            
            const select = document.getElementById('attClassSelect');
            select.innerHTML = '<option value="">Chọn lớp</option>';
            
            classes.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.maLop;
                option.textContent = cls.tenLop || cls.maLop;
                select.appendChild(option);
            });
        }
    } catch (error) {
        console.error('Error loading classes:', error);
    }
}

async function loadAttendanceSheet() {
    const classId = document.getElementById('attClassSelect').value;
    const date = document.getElementById('attDate').value;
    
    if (!classId || !date) {
        document.getElementById('attendanceSheet').innerHTML = 
            '<div class="text-center py-5"><p class="text-secondary">Vui lòng chọn lớp và ngày</p></div>';
        return;
    }
    
    try {
        showLoading('attendanceSheet');
        
        // Load students for the class
        const studentsData = await getHLVStudents(classId);
        
        if (studentsData.success) {
            currentStudents = studentsData.data;
            
            // Load existing attendance if any
            const attendanceData = await getAttendance(classId, date);
            const attendanceMap = {};
            
            if (attendanceData.success && attendanceData.data) {
                attendanceData.data.forEach(record => {
                    attendanceMap[record.maHocVien] = record.trangThai;
                });
            }
            
            renderAttendanceSheet(attendanceMap);
            loadAttendanceHistory(classId);
        } else {
            document.getElementById('attendanceSheet').innerHTML = 
                '<div class="alert alert-warning">Không thể tải danh sách học viên</div>';
        }
    } catch (error) {
        console.error('Error loading attendance sheet:', error);
        document.getElementById('attendanceSheet').innerHTML = 
            '<div class="alert alert-danger">Lỗi khi tải dữ liệu điểm danh</div>';
        showToast('Không thể tải dữ liệu điểm danh', 'error');
    }
}

function renderAttendanceSheet(attendanceMap) {
    if (!currentStudents || currentStudents.length === 0) {
        document.getElementById('attendanceSheet').innerHTML = 
            '<div class="alert alert-info">Lớp này không có học viên</div>';
        return;
    }
    
    let html = `
        <table class="table">
            <thead>
                <tr>
                    <th style="width: 50px;">STT</th>
                    <th>Học viên</th>
                    <th style="width: 100px;">Có mặt</th>
                    <th style="width: 100px;">Vắng</th>
                    <th style="width: 100px;">Muộn</th>
                    <th style="width: 200px;">Ghi chú</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    currentStudents.forEach((student, index) => {
        const status = attendanceMap[student.maHocVien] || 'present';
        
        html += `
            <tr>
                <td>${index + 1}</td>
                <td>
                    <strong>${student.hoTen}</strong><br>
                    <small class="text-secondary">${student.maHocVien}</small>
                </td>
                <td>
                    <input type="radio" name="att_${student.maHocVien}" value="present" 
                           ${status === 'present' ? 'checked' : ''}>
                </td>
                <td>
                    <input type="radio" name="att_${student.maHocVien}" value="absent" 
                           ${status === 'absent' ? 'checked' : ''}>
                </td>
                <td>
                    <input type="radio" name="att_${student.maHocVien}" value="late" 
                           ${status === 'late' ? 'checked' : ''}>
                </td>
                <td>
                    <input type="text" class="form-control form-control-sm" 
                           id="note_${student.maHocVien}" placeholder="Ghi chú">
                </td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    document.getElementById('attendanceSheet').innerHTML = html;
}

async function loadAttendanceHistory(classId) {
    try {
        // This would call an API to get attendance history
        // For now, showing placeholder
        document.getElementById('attHistory').innerHTML = 
            '<p class="text-secondary small">Chưa có lịch sử điểm danh</p>';
    } catch (error) {
        console.error('Error loading attendance history:', error);
    }
}

async function saveAttendance() {
    const classId = document.getElementById('attClassSelect').value;
    const date = document.getElementById('attDate').value;
    
    if (!classId || !date) {
        showToast('Vui lòng chọn lớp và ngày', 'warning');
        return;
    }
    
    const records = [];
    
    currentStudents.forEach(student => {
        const status = document.querySelector(`input[name="att_${student.maHocVien}"]:checked`)?.value;
        const note = document.getElementById(`note_${student.maHocVien}`)?.value || '';
        
        if (status) {
            records.push({
                maHocVien: student.maHocVien,
                trangThai: status,
                ghiChu: note
            });
        }
    });
    
    if (records.length === 0) {
        showToast('Vui lòng điểm danh cho ít nhất một học viên', 'warning');
        return;
    }
    
    try {
        const data = await saveAttendance({
            maLop: classId,
            ngayDay: date,
            chiTiet: records
        });
        
        if (data.success) {
            showToast('Lưu điểm danh thành công!', 'success');
            loadAttendanceHistory(classId);
        } else {
            showToast('Lưu điểm danh thất bại: ' + data.message, 'error');
        }
    } catch (error) {
        console.error('Error saving attendance:', error);
        showToast('Lỗi khi lưu điểm danh', 'error');
    }
}
</script>
</body>
</html>
